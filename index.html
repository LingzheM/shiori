<!doctype html>
<html lang="ja" data-theme="paper" data-font="mincho">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F1ECE1" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>栞 — しおり</title>
    <script>
      // 首帧防闪烁：在 React 挂载前恢复主题
      try {
        var s = JSON.parse(localStorage.getItem('dokusho:settings'));
        if (s) {
          document.documentElement.dataset.theme = s.theme || 'paper';
          document.documentElement.dataset.font = s.font || 'mincho';
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
